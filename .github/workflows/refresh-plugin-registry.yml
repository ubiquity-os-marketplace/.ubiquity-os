name: Refresh marketplace plugin registry

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test registry generator
        run: node --test scripts/refresh-plugin-registry.test.cjs

      - name: Generate registry
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/refresh-plugin-registry.cjs

      - name: Commit changes
        shell: bash
        run: |
          git add .github/ubiquity-os-marketplace.plugin-registry.json .github/ubiquity-os-marketplace.plugin-registry.meta.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh plugin registry"
          git push
